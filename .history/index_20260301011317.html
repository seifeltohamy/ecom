<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Finance Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0a09;
      --surface:   #151312;
      --surface2:  #1b1917;
      --border:    #272522;
      --border2:   #3a3733;
      --text:      #f5f5f4;
      --muted:     #a8a29e;
      --accent:    #f97316;
      --accent-h:  #ea580c;
      --danger:    #ef4444;
      --danger-bg: rgba(239,68,68,.1);
      --success:   #22c55e;
      --radius:    12px;
      --radius-sm: 8px;
      --sidebar:   #0f0d0c;
    }

    body {
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, #1c1917 0%, #0c0a09 55%, #090807 100%);
      color: var(--text);
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* auth helpers */
const getToken    = () => localStorage.getItem('zen_token');
const saveToken   = t  => localStorage.setItem('zen_token', t);
const clearToken  = () => localStorage.removeItem('zen_token');
const authFetch   = (url, opts = {}) => {
  const token = getToken();
  const headers = { ...(opts.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(url, { ...opts, headers });
};

/* helpers */
const fmt  = n => Number(n || 0).toLocaleString('en-EG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtN = n => Number(n || 0).toLocaleString();

const moneyInCategories = ["Kashier", "Bosta", "Instapay"];
const moneyOutCategories = [
  "Ads", "Mabakher", "Bokhour", "Mabakher + 9 pcs", "Uber", "Fountains", "Foam",
  "Carton Boxes", "Charity", "Ekrameya", "Salary", "Seif Gamal", "Sama", "Refund",
  "Outing", "Transportation", "Essential Bundles Shopify App", "Domain", "Shopify"
];

const sampleCashflow = [
  { id: 1, date: "21/1", type: "in", amount: 1335, category: "Kashier", notes: "" },
  { id: 2, date: "25/1", type: "in", amount: 19903.02, category: "Bosta", notes: "Ads + Uber" },
  { id: 3, date: "25/1", type: "out", amount: 3766, category: "Ads", notes: "Ads + Uber" },
  { id: 4, date: "26/1", type: "out", amount: 12150, category: "Bokhour", notes: "16 box bokhour" }
];

/* design tokens (inline styles) */
const S = {
  app: { display: 'flex', minHeight: '100vh' },
  sidebar: {
    width: 250,
    background: 'var(--sidebar)',
    borderRight: '1px solid var(--border)',
    padding: '1.5rem 1.25rem',
    position: 'sticky', top: 0, height: '100vh',
    display: 'flex', flexDirection: 'column', gap: '1.25rem'
  },
  brand: {
    display: 'flex', alignItems: 'center', gap: '.75rem',
    paddingBottom: '1rem', borderBottom: '1px solid var(--border)'
  },
  logo: {
    width: 36, height: 36, borderRadius: 10,
    background: 'linear-gradient(135deg, #f97316, #f59e0b)',
    display: 'grid', placeItems: 'center', color: '#0c0a09', fontWeight: 700
  },
  navItem: (active) => ({
    display: 'flex', alignItems: 'center', gap: '.6rem',
    padding: '.6rem .75rem',
    borderRadius: 'var(--radius-sm)',
    color: active ? '#0c0a09' : 'var(--text)',
    background: active ? 'var(--accent)' : 'transparent',
    cursor: 'pointer', fontWeight: 600, fontSize: '.95rem',
    transition: 'background .15s, color .15s'
  }),
  main: { flex: 1, padding: '2rem 2.25rem 2.5rem' },
  header: {
    marginBottom: '1.5rem',
    display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between',
    gap: '1rem', flexWrap: 'wrap'
  },
  h1: {
    fontSize: '1.6rem', fontWeight: 700, letterSpacing: '-0.5px', color: '#fafafa'
  },
  sub: {
    fontSize: '.9rem', color: 'var(--muted)', marginTop: '.2rem'
  },
  card: {
    background: 'var(--surface)',
    border: '1px solid var(--border)',
    borderRadius: 'var(--radius)',
    padding: '1.5rem',
    marginBottom: '1rem',
    animation: 'fadeIn .2s ease'
  },
  cardTitle: {
    fontSize: '.7rem',
    fontWeight: 600,
    textTransform: 'uppercase',
    letterSpacing: '.08em',
    color: 'var(--muted)',
    marginBottom: '1rem',
    paddingBottom: '.75rem',
    borderBottom: '1px solid var(--border)'
  },
  btnBase: {
    display: 'inline-flex', alignItems: 'center', gap: '.4rem',
    padding: '.5rem 1rem',
    borderRadius: 'var(--radius-sm)',
    fontSize: '.9rem', fontWeight: 600,
    cursor: 'pointer', border: 'none',
    transition: 'background .15s, opacity .15s',
    outline: 'none'
  },
  btnPrimary:  { background: 'var(--accent)',   color: '#0c0a09' },
  btnOutline:  { background: 'transparent',     color: 'var(--text)', border: '1px solid var(--border2)' },
  btnDanger:   { background: 'var(--danger-bg)', color: 'var(--danger)', border: '1px solid rgba(239,68,68,.25)' },
  btnDisabled: { opacity: .4, cursor: 'not-allowed' },
  mono: { fontFamily: '"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace' }
};

/* primitives */
function Card({ children, style }) { return <div style={{ ...S.card, ...style }}>{children}</div>; }
function CardTitle({ children }) { return <div style={S.cardTitle}>{children}</div>; }
function Btn({ variant = 'primary', disabled, onClick, children, style }) {
  const v = variant === 'primary' ? S.btnPrimary
          : variant === 'danger'  ? S.btnDanger
          : S.btnOutline;
  return (
    <button
      onClick={disabled ? undefined : onClick}
      style={{ ...S.btnBase, ...v, ...(disabled ? S.btnDisabled : {}), ...style }}
    >
      {children}
    </button>
  );
}
function Badge({ children }) {
  return (
    <span style={{
      display: 'inline-block', padding: '.15rem .5rem', borderRadius: 6,
      fontSize: '.72rem', fontWeight: 600,
      background: 'var(--accent)', color: '#0c0a09',
      fontFamily: '"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace',
      letterSpacing: '.02em'
    }}>{children}</span>
  );
}
function Spinner({ size = 16 }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      borderRadius: '50%', border: `2px solid var(--border2)`,
      borderTopColor: 'var(--accent)', animation: 'spin .6s linear infinite',
      flexShrink: 0
    }} />
  );
}
function Alert({ type, children }) {
  const colors = {
    error:   { bg: 'rgba(239,68,68,.1)',  border: 'rgba(239,68,68,.3)',  text: 'var(--danger)' },
    loading: { bg: 'var(--surface2)',      border: 'var(--border)',       text: 'var(--muted)'  },
    success: { bg: 'rgba(34,197,94,.1)',   border: 'rgba(34,197,94,.3)', text: 'var(--success)' }
  }[type] || {};
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: '.5rem',
      padding: '.65rem 1rem', borderRadius: 'var(--radius-sm)',
      background: colors.bg, border: `1px solid ${colors.border}`,
      color: colors.text, fontSize: '.875rem', marginTop: '.75rem',
      animation: 'fadeIn .2s ease'
    }}>
      {type === 'loading' && <Spinner />}
      <span>{children}</span>
    </div>
  );
}

/* Drop Zone */
function DropZone({ onFile, file }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef();

  const handle = f => {
    if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) onFile(f);
  };

  return (
    <div
      onClick={() => inputRef.current.click()}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={e => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}
      style={{
        border: `2px dashed ${drag ? 'var(--accent)' : 'var(--border2)'}`,
        borderRadius: 'var(--radius)',
        padding: '2.5rem 1rem', textAlign: 'center', cursor: 'pointer',
        background: drag ? 'rgba(249,115,22,.08)' : 'var(--surface2)',
        transition: 'all .2s', position: 'relative'
      }}
    >
      <input
        ref={inputRef}
        type="file"
        accept=".xlsx,.xls"
        style={{ display: 'none' }}
        onChange={e => handle(e.target.files[0])}
      />
      <div style={{ fontSize: '2rem', marginBottom: '.5rem' }}>📊</div>
      <p style={{ color: 'var(--text)', fontWeight: 500, fontSize: '.9rem' }}>
        {file ? file.name : <><strong>Click to choose</strong> or drag &amp; drop</>}
      </p>
      <p style={{ color: 'var(--muted)', fontSize: '.8rem', marginTop: '.25rem' }}>
        {file ? `${(file.size / 1024).toFixed(1)} KB` : 'Accepts .xlsx / .xls'}
      </p>
    </div>
  );
}

/* Stat cards */
function StatBar({ rows, grand_quantity, grand_revenue, order_count }) {
  const stats = [
    { label: 'Orders',           value: fmtN(order_count)      },
    { label: 'Total SKUs',       value: rows.length.toString() },
    { label: 'Total Units Sold', value: fmtN(grand_quantity)   },
    { label: 'Total Revenue',    value: `EGP ${fmt(grand_revenue)}` }
  ];
  return (
    <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', flex: 1 }}>
      {stats.map(s => (
        <div key={s.label} style={{
          flex: '1', minWidth: 140,
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: 'var(--radius)',
          padding: '1.1rem 1.25rem',
          animation: 'fadeIn .3s ease'
        }}>
          <div style={{ fontSize: '.68rem', textTransform: 'uppercase', letterSpacing: '.07em', color: 'var(--muted)', fontWeight: 600 }}>
            {s.label}
          </div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: 'var(--text)' }}>
            {s.value}
          </div>
        </div>
      ))}
    </div>
  );
}

/* Report Table */
function ReportTable({ data }) {
  const [sortKey, setSortKey] = useState('default');
  const [sortDir, setSortDir] = useState('asc');
  const [expanded, setExpanded] = useState({});

  const toggleExpand = sku => setExpanded(p => ({ ...p, [sku]: !p[sku] }));

  const toggleSort = key => {
    if (key === 'default') { setSortKey('default'); setSortDir('asc'); return; }
    if (sortKey === key) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const sorted = [...data.rows].sort((a, b) => {
    if (sortKey === 'default') return 0;
    let av, bv;
    if (sortKey === 'revenue')  { av = a.total_revenue;  bv = b.total_revenue; }
    else if (sortKey === 'qty') { av = a.total_quantity; bv = b.total_quantity; }
    else if (sortKey === 'name'){ av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else                        { av = a.sku; bv = b.sku; }
    if (av < bv) return sortDir === 'asc' ? -1 :  1;
    if (av > bv) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });

  const arrow = key => sortKey === key && key !== 'default' ? (sortDir === 'desc' ? ' ↓' : ' ↑') : '';

  const thBase = {
    padding: '.65rem .85rem',
    fontSize: '.68rem', textTransform: 'uppercase', letterSpacing: '.06em',
    color: 'var(--muted)', fontWeight: 600,
    borderBottom: '1px solid var(--border)', whiteSpace: 'nowrap', userSelect: 'none'
  };
  const thSort = { ...thBase, cursor: 'pointer' };
  const td = {
    padding: '.6rem .85rem', borderBottom: '1px solid var(--border)',
    fontSize: '.875rem', verticalAlign: 'middle'
  };

  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse' }}>
        <thead>
          <tr style={{ background: 'var(--bg)' }}>
            <th style={{ ...thSort, textAlign: 'left'  }} onClick={() => toggleSort('sku')}>SKU{arrow('sku')}</th>
            <th style={{ ...thSort, textAlign: 'left'  }} onClick={() => toggleSort('name')}>Product{arrow('name')}</th>
            <th style={{ ...thBase, textAlign: 'left'  }}>Price (EGP)</th>
            <th style={{ ...thSort, textAlign: 'right' }} onClick={() => toggleSort('qty')}>Qty{arrow('qty')}</th>
            <th style={{ ...thSort, textAlign: 'right' }} onClick={() => toggleSort('revenue')}>Total (EGP){arrow('revenue')}</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(row => {
            const isExpanded = expanded[row.sku] !== false;
            const multiPrice = row.prices.length > 1;
            return (
              <React.Fragment key={row.sku}>
                <tr
                  style={{ background: 'var(--surface2)', borderLeft: '3px solid var(--accent)', cursor: multiPrice ? 'pointer' : 'default' }}
                  onClick={() => multiPrice && toggleExpand(row.sku)}
                >
                  <td style={{ ...td, paddingLeft: '.7rem' }}>
                    <Badge>{row.sku}</Badge>
                  </td>
                  <td style={{ ...td, fontWeight: 600, color: 'var(--text)' }}>
                    <span style={{ display: 'flex', alignItems: 'center', gap: '.4rem' }}>
                      {row.name}
                      {multiPrice && (
                        <span style={{ fontSize: '.7rem', color: 'var(--muted)', fontWeight: 400 }}>
                          {isExpanded ? '▲' : '▼'}
                        </span>
                      )}
                    </span>
                  </td>
                  <td style={{ ...td, ...S.mono, color: 'var(--muted)', fontSize: '.82rem' }}>
                    {multiPrice ? `${row.prices.length} prices` : fmt(row.prices[0].price)}
                  </td>
                  <td style={{ ...td, textAlign: 'right', fontWeight: 700 }}>
                    {fmtN(row.total_quantity)}
                  </td>
                  <td style={{ ...td, textAlign: 'right', fontWeight: 700, ...S.mono, color: 'var(--accent)' }}>
                    {fmt(row.total_revenue)}
                  </td>
                </tr>

                {multiPrice && isExpanded && row.prices.map((p, i) => (
                  <tr key={i}>
                    <td style={{ ...td, borderLeft: '3px solid transparent' }} />
                    <td style={{ ...td, color: 'var(--muted)', fontSize: '.82rem' }} />
                    <td style={{ ...td, ...S.mono, color: 'var(--muted)', fontSize: '.82rem' }}>
                      {fmt(p.price)}
                    </td>
                    <td style={{ ...td, textAlign: 'right', color: 'var(--muted)', fontSize: '.82rem' }}>
                      {fmtN(p.quantity)}
                    </td>
                    <td style={{ ...td, textAlign: 'right', ...S.mono, color: 'var(--muted)', fontSize: '.82rem' }}>
                      {fmt(p.total)}
                    </td>
                  </tr>
                ))}
              </React.Fragment>
            );
          })}

          <tr style={{ borderTop: '2px solid var(--accent)', background: 'var(--surface2)' }}>
            <td style={{ ...td, fontWeight: 700, borderBottom: 'none', borderLeft: '3px solid var(--accent)' }} colSpan={2}>
              Grand Total
            </td>
            <td style={{ ...td, borderBottom: 'none' }} />
            <td style={{ ...td, textAlign: 'right', fontWeight: 700, borderBottom: 'none', color: 'var(--accent)', fontSize: '1rem' }}>
              {fmtN(data.grand_quantity)}
            </td>
            <td style={{ ...td, textAlign: 'right', fontWeight: 700, ...S.mono, borderBottom: 'none', color: 'var(--accent)', fontSize: '1rem' }}>
              {fmt(data.grand_revenue)}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

/* Date Range Button */
function DateRangeButton({ onApply, activeFrom, activeTo }) {
  const [open, setOpen] = useState(false);
  const [from, setFrom] = useState(activeFrom || '');
  const [to,   setTo]   = useState(activeTo   || '');
  const ref = useRef();

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleFrom = val => {
    setFrom(val);
    if (to) { onApply(val, to); setOpen(false); }
  };
  const handleTo = val => {
    setTo(val);
    if (from) { onApply(from, val); setOpen(false); }
  };
  const clear = () => { setFrom(''); setTo(''); onApply('', ''); setOpen(false); };

  const fmtD = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '…';
  const label = (activeFrom || activeTo)
    ? `📅 ${fmtD(activeFrom)} – ${fmtD(activeTo)}`
    : '📅 Filter by date';

  const inputStyle = {
    padding: '.45rem .7rem', background: 'var(--bg)',
    border: '1px solid var(--border2)', borderRadius: 'var(--radius-sm)',
    color: 'var(--text)', fontSize: '.875rem', outline: 'none', colorScheme: 'dark',
    cursor: 'pointer', width: '100%'
  };

  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block', alignSelf: 'flex-start' }}>
      <Btn variant={activeFrom || activeTo ? 'primary' : 'outline'} onClick={() => setOpen(o => !o)}>
        {label}
      </Btn>

      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 6px)', right: 0,
          background: 'var(--surface)', border: '1px solid var(--border2)',
          borderRadius: 'var(--radius)', padding: '1rem', zIndex: 100,
          minWidth: 220, boxShadow: '0 8px 24px rgba(0,0,0,.5)',
          animation: 'fadeIn .15s ease'
        }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '.4rem' }}>
            <label style={{ fontSize: '.7rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em' }}>From</label>
            <input type="date" style={inputStyle} value={from} onChange={e => handleFrom(e.target.value)} />
            <label style={{ fontSize: '.7rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', marginTop: '.25rem' }}>To</label>
            <input type="date" style={inputStyle} value={to} onChange={e => handleTo(e.target.value)} />
          </div>
          {(from || to) && (
            <button onClick={clear} style={{
              marginTop: '.75rem', width: '100%', padding: '.4rem',
              background: 'none', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', color: 'var(--muted)',
              fontSize: '.8rem', cursor: 'pointer'
            }}>
              Clear filter
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* Bosta Orders */
function BostaOrdersTab() {
  const [file,    setFile]    = useState(null);
  const [status,  setStatus]  = useState(null);
  const [report,  setReport]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo,   setDateTo]   = useState('');
  const [history,  setHistory]  = useState([]);
  const [historyLoading, setHistoryLoading] = useState(true);

  const loadHistory = useCallback(async () => {
    setHistoryLoading(true);
    try {
      const res  = await authFetch('/reports');
      const data = await res.json();
      if (res.ok) setHistory(data);
    } finally {
      setHistoryLoading(false);
    }
  }, []);

  useEffect(() => { loadHistory(); }, [loadHistory]);

  const runReport = async (from, to) => {
    if (!file) return;
    setLoading(true);
    setStatus({ type: 'loading', msg: 'Processing…' });
    const fd = new FormData();
    fd.append('file', file);
    if (from) fd.append('date_from', from);
    if (to)   fd.append('date_to',   to);
    try {
      const res  = await authFetch('/upload', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      setStatus(null);
      setReport(data);
      loadHistory();
    } catch (err) {
      setStatus({ type: 'error', msg: err.message });
    } finally {
      setLoading(false);
    }
  };

  const upload = () => runReport('', '');

  const applyDates = (from, to) => {
    setDateFrom(from);
    setDateTo(to);
    runReport(from, to);
  };

  const clear = () => { setFile(null); setReport(null); setStatus(null); setDateFrom(''); setDateTo(''); };

  const viewReport = async (id) => {
    const res  = await authFetch(`/reports/${id}`);
    const data = await res.json();
    if (res.ok) setReport(data);
  };

  const thStyle = {
    padding: '.6rem .85rem',
    fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em',
    color: 'var(--muted)', textAlign: 'left', borderBottom: '1px solid var(--border)'
  };
  const tdStyle = {
    padding: '.65rem .85rem', borderBottom: '1px solid var(--border)', fontSize: '.875rem'
  };

  return (
    <div>
      <Card>
        <CardTitle>Upload New Report</CardTitle>
        <DropZone onFile={setFile} file={file} />
        <div style={{ display: 'flex', gap: '.6rem', marginTop: '1rem', alignItems: 'center' }}>
          <Btn disabled={!file || loading} onClick={upload}>
            {loading ? <><Spinner size={13} /> Processing…</> : 'Run Report'}
          </Btn>
          {report && <Btn variant="outline" onClick={clear}>Clear</Btn>}
        </div>
        {status && <Alert type={status.type}>{status.msg}</Alert>}
      </Card>

      {report && (
        <>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '.5rem' }}>
            <StatBar {...report} />
            <DateRangeButton file={file} onApply={applyDates} activeFrom={dateFrom} activeTo={dateTo} />
          </div>
          <Card>
            <CardTitle>Sales Breakdown</CardTitle>
            <ReportTable data={report} />
          </Card>

      <Card>

            ? <div style={{ color: 'var(--muted)', fontSize: '.9rem' }}>No reports saved yet. Upload one above.</div>
            : (
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr>
                      <th style={thStyle}>Uploaded</th>
                      <th style={thStyle}>Date Range</th>
                      <th style={thStyle}>Orders</th>
                      <th style={{ ...thStyle, textAlign: 'right' }}>Revenue</th>
                      <th style={{ ...thStyle, textAlign: 'right' }} />
                    </tr>
                  </thead>
                  <tbody>
                    {history.map(h => (
                      <tr key={h.id}>
                        <td style={tdStyle}>{new Date(h.uploaded_at).toLocaleString('en-GB')}</td>
                        <td style={{ ...tdStyle, color: 'var(--muted)' }}>
                          {h.date_from || '—'} → {h.date_to || '—'}
                        </td>
                        <td style={tdStyle}>{fmtN(h.order_count)}</td>

                          EGP {fmt(h.grand_revenue)}
                        </td>

                          <Btn variant="outline" onClick={() => viewReport(h.id)}>View</Btn>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )
        }
      </Card>
    </div>
  );
}

/* Products Tab */
function ProductsTab() {
  const [products, setProducts] = useState({});
  const [sku,  setSku]  = useState('');
  const [name, setName] = useState('');
  const [alert, setAlert] = useState(null);

  const load = useCallback(async () => {
    const res  = await authFetch('/products');
    const data = await res.json();
    setProducts(data);
  }, []);

  useEffect(() => { load(); }, [load]);

  const add = async () => {
    if (!sku.trim() || !name.trim()) {
      setAlert({ type: 'error', msg: 'Both SKU and name are required.' });
      return;
    }
    const res  = await authFetch('/products', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sku: sku.trim(), name: name.trim() })
    });
    const data = await res.json();
    if (!res.ok) { setAlert({ type: 'error', msg: data.detail }); return; }
    setSku(''); setName('');
    setAlert({ type: 'success', msg: `"${data.name}" added.` });
    load();
    setTimeout(() => setAlert(null), 2500);
  };

  const del = async (s) => {
    if (!confirm(`Remove ${s}?`)) return;
    await authFetch(`/products/${encodeURIComponent(s)}`, { method: 'DELETE' });
    load();
  };

  const inputStyle = {
    flex: 1, minWidth: 140,
    padding: '.5rem .8rem',
    background: 'var(--surface2)',
    border: '1px solid var(--border2)',
    borderRadius: 'var(--radius-sm)',
    color: 'var(--text)',
    fontSize: '.875rem',
    outline: 'none'
  };

  const entries = Object.entries(products);

  const thStyle = {
    padding: '.6rem .85rem',
    fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em',
    color: 'var(--muted)', textAlign: 'left', borderBottom: '1px solid var(--border)'
  };
  const tdStyle = {
    padding: '.7rem .85rem', borderBottom: '1px solid var(--border)', fontSize: '.9rem'
  };

  return (
    <div>
      <Card>
        <CardTitle>Add / Update Product</CardTitle>
        <div style={{ display: 'flex', gap: '.6rem', flexWrap: 'wrap' }}>
          <input
            style={inputStyle}
            placeholder="SKU  (e.g. BO-2159519)"
            value={sku}
            onChange={e => setSku(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && add()}
          />
          <input
            style={inputStyle}
            placeholder="Product name"
            value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && add()}
          />
          <Btn onClick={add}>Add</Btn>
        </div>
        {alert && <Alert type={alert.type}>{alert.msg}</Alert>}
      </Card>

      <Card>
        <CardTitle>Stored Products ({entries.length})</CardTitle>
        {entries.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '2rem', color: 'var(--muted)', fontSize: '.9rem' }}>
            <div style={{ fontSize: '2rem', marginBottom: '.5rem' }}>📦</div>
            No products yet.
          </div>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr>
                  <th style={thStyle}>SKU</th>
                  <th style={thStyle}>Name</th>
                  <th style={thStyle} />
                </tr>
              </thead>
              <tbody>
                {entries.map(([s, n]) => (
                  <tr key={s} style={{ transition: 'background .1s' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--surface2)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  >
                    <td style={{ ...tdStyle, ...S.mono }}><Badge>{s}</Badge></td>
                    <td style={tdStyle}>{n}</td>
                    <td style={{ ...tdStyle, textAlign: 'right' }}>
                      <Btn variant="danger" onClick={() => del(s)}>Remove</Btn>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

/* Cashflow */
function CashflowTab({ rows, onAdd, onDelete, onEdit, months, activeMonth, onMonthChange, onAddMonth }) {
  const [open, setOpen] = useState(false);
  const [date, setDate] = useState('');
  const [type, setType] = useState('in');
  const [amount, setAmount] = useState('');
  const [category, setCategory] = useState('');
  const [notes, setNotes] = useState('');
  const [error, setError] = useState('');
  const [newMonth, setNewMonth] = useState('');
  const [confirmRow, setConfirmRow] = useState(null);
  const [editRow, setEditRow] = useState(null);
  const [search, setSearch] = useState('');

  const reset = () => {
    setDate(''); setType('in'); setAmount(''); setCategory(''); setNotes(''); setError('');
    setEditRow(null);
  };

  const openEdit = (r) => {
    setEditRow(r);
    setDate(r.date);
    setType(r.type);
    setAmount(String(r.amount));
    setCategory(r.category);
    setNotes(r.notes || '');
    setError('');
    setOpen(true);
  };

  const submit = () => {
    if (!amount || Number(amount) <= 0) return setError('Amount must be greater than zero.');
    if (!category) return setError('Category is required.');

    if (editRow) {
      onEdit(editRow.id, { date: date || editRow.date, type, amount: Number(amount), category, notes: notes.trim() });
    } else {
      const today = new Date();
      const autoDate = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'numeric' });
      onAdd({ id: Date.now(), date: autoDate, type, amount: Number(amount), category, notes: notes.trim() });
    }
    reset();
    setOpen(false);
  };

  const netFlow = r => (r.type === 'in' ? r.amount : -r.amount);

  const thStyle = {
    padding: '.7rem .85rem',
    fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em',
    color: 'var(--muted)', textAlign: 'left', borderBottom: '1px solid var(--border)'
  };

    padding: '.7rem .85rem', borderBottom: '1px solid var(--border)', fontSize: '.9rem'

  const categories = type === 'in' ? moneyInCategories : moneyOutCategories;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '.75rem' }}>

        </div>
        <div style={{ display: 'flex', gap: '.6rem', flexWrap: 'wrap', alignItems: 'center' }}>

      {rows.length > 0 && (() => {
        const totalIn  = rows.filter(r => r.type === 'in').reduce((s, r) => s + r.amount, 0);
        const totalOut = rows.filter(r => r.type === 'out').reduce((s, r) => s + r.amount, 0);

                    {r.type === 'in' ? `EGP ${fmt(r.amount)}` : ''}
                  </td>
                  <td style={{ ...tdStyle, color: r.type === 'out' ? 'var(--danger)' : 'var(--muted)' }}>
                    {r.type === 'out' ? `EGP ${fmt(r.amount)}` : ''}

                  <td style={tdStyle}>
                    {r.notes || r.category}

                  <td style={{ ...tdStyle, textAlign: 'right', ...S.mono, color: r.running >= 0 ? 'var(--success)' : 'var(--danger)' }}>

          <div style={{
            width: 'min(560px, 92vw)', background: 'var(--surface)',
            border: '1px solid var(--border2)', borderRadius: 'var(--radius)',
            padding: '1.4rem', boxShadow: '0 20px 60px rgba(0,0,0,.6)',

          position: 'fixed', inset: 0, background: 'rgba(0,0,0,.65)',

        }}>

/* Analytics */
function AnalyticsTab({ rows }) {
  const totals = useMemo(() => {
    let totalIn = 0;
    let totalOut = 0;
    const outByCategory = {};

    rows.forEach(r => {
      if (r.type === 'in') totalIn += r.amount;
      if (r.type === 'out') {
        totalOut += r.amount;
        outByCategory[r.category] = (outByCategory[r.category] || 0) + r.amount;
      }
    });

    const dist = Object.entries(outByCategory)
      .map(([category, amount]) => ({ category, amount }))
      .sort((a, b) => b.amount - a.amount);

    return { totalIn, totalOut, dist };
  }, [rows]);

  return (
    <div>
      <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
        <div style={{ flex: '1', minWidth: 200, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '1rem' }}>
          <div style={{ fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--muted)' }}>Total Money In</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.35rem', color: 'var(--success)' }}>EGP {fmt(totals.totalIn)}</div>
        </div>
        <div style={{ flex: '1', minWidth: 200, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '1rem' }}>
          <div style={{ fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em', color: 'var(--muted)' }}>Total Money Out</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.35rem', color: 'var(--danger)' }}>EGP {fmt(totals.totalOut)}</div>
        </div>
      </div>

      <Card>
        <CardTitle>Money Out Distribution</CardTitle>
        {totals.dist.length === 0 ? (
          <div style={{ color: 'var(--muted)', fontSize: '.9rem' }}>No money-out entries yet.</div>
        ) : (
          <div style={{ display: 'grid', gap: '.65rem' }}>
            {totals.dist.map(d => (
              <div key={d.category} style={{ display: 'grid', gridTemplateColumns: '160px 1fr 120px', gap: '.75rem', alignItems: 'center' }}>
                <div style={{ fontWeight: 600 }}>{d.category}</div>
                <div style={{ height: 10, background: 'var(--surface2)', borderRadius: 999 }}>
                  <div style={{
                    height: '100%', borderRadius: 999,
                    width: `${Math.max(6, (d.amount / totals.totalOut) * 100)}%`,
                    background: 'linear-gradient(90deg, #f97316, #f59e0b)'
                  }} />
                </div>
                <div style={{ textAlign: 'right', ...S.mono, color: 'var(--muted)' }}>EGP {fmt(d.amount)}</div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

  const cs = { flex: '1', minWidth: 180, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '1.1rem 1.25rem', animation: 'fadeIn .3s ease' };

  return (

        >
          {months.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
      </div>
      {loading && <Alert type="loading">Loading dashboard…</Alert>}
      {!loading && !summary && <Alert type="error">Failed to load summary.</Alert>}
      {!loading && summary && <>
      <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
        <div style={cs}>
          <div style={ls}>{selectedMonth} — In</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: 'var(--success)' }}>EGP {fmt(summary.this_month_in)}</div>
        </div>
        <div style={cs}>
          <div style={ls}>{selectedMonth} — Out</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: 'var(--danger)' }}>EGP {fmt(summary.this_month_out)}</div>
        </div>
        <div style={cs}>
          <div style={ls}>{selectedMonth} — Net</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: summary.this_month_net >= 0 ? 'var(--success)' : 'var(--danger)' }}>EGP {fmt(summary.this_month_net)}</div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginBottom: '1rem' }}>
        <div style={cs}>
          <div style={ls}>YTD — Total In</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: 'var(--success)' }}>EGP {fmt(summary.total_in_ytd)}</div>
        </div>
        <div style={cs}>
          <div style={ls}>YTD — Total Out</div>
          <div style={{ fontSize: '1.4rem', fontWeight: 700, marginTop: '.3rem', color: 'var(--danger)' }}>EGP {fmt(summary.total_out_ytd)}</div>
        </div>
      </div>
      {summary.last_report && (
        <Card>
          <CardTitle>Last Bosta Report</CardTitle>
          <div style={{ display: 'flex', gap: '2rem', flexWrap: 'wrap', fontSize: '.9rem' }}>
            <div><span style={{ color: 'var(--muted)' }}>Uploaded </span><strong>{new Date(summary.last_report.uploaded_at).toLocaleString('en-GB')}</strong></div>
            <div><span style={{ color: 'var(--muted)' }}>Orders </span><strong>{fmtN(summary.last_report.order_count)}</strong></div>
            <div><span style={{ color: 'var(--muted)' }}>Revenue </span><strong style={{ color: 'var(--accent)' }}>EGP {fmt(summary.last_report.grand_revenue)}</strong></div>
          </div>
          {summary.top_sku && (
            <div style={{ marginTop: '.75rem', fontSize: '.85rem', color: 'var(--muted)' }}>
              Top SKU: <Badge>{summary.top_sku.sku}</Badge>{' '}
              <span style={{ color: 'var(--text)' }}>{summary.top_sku.name}</span> — {fmtN(summary.top_sku.total_quantity)} units
            </div>
          )}
        </Card>
      )}
      <div style={{ display: 'flex', gap: '.6rem', flexWrap: 'wrap', marginTop: '.5rem' }}>
        <Btn variant="outline" onClick={() => onNavigate('cashflow')}>→ Cashflow</Btn>
        <Btn variant="outline" onClick={() => onNavigate('bosta')}>→ Bosta Orders</Btn>
        <Btn variant="outline" onClick={() => onNavigate('analytics')}>→ Analytics</Btn>
      </div>
      </>}
    </div>
  );
}

/* User Management Tab (admin only) */
function UsersTab({ currentUserEmail }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [role, setRole] = useState('viewer');
  const [alert, setAlert] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const res = await authFetch('/users');
    const data = await res.json();
    if (res.ok) setUsers(data);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const create = async () => {
    if (!email.trim() || !password.trim()) {
      setAlert({ type: 'error', msg: 'Email and password are required.' });
      return;
    }
    const res = await authFetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email.trim(), password: password.trim(), role })
    });
    const data = await res.json();
    if (!res.ok) { setAlert({ type: 'error', msg: data.detail || 'Failed to create user.' }); return; }
    setAlert({ type: 'success', msg: `User ${email.trim()} created.` });
    setEmail(''); setPassword(''); setRole('viewer');
    load();
    setTimeout(() => setAlert(null), 2500);
  };

  const del = async (id, userEmail) => {
    if (!confirm(`Delete user ${userEmail}?`)) return;
    const res = await authFetch(`/users/${id}`, { method: 'DELETE' });
    if (!res.ok) {
      const data = await res.json();
      setAlert({ type: 'error', msg: data.detail || 'Failed to delete.' });
      return;
    }
    load();
  };

  const thStyle = {
    padding: '.6rem .85rem',
    fontSize: '.7rem', textTransform: 'uppercase', letterSpacing: '.06em',
    color: 'var(--muted)', textAlign: 'left', borderBottom: '1px solid var(--border)'
  };
  const tdStyle = { padding: '.7rem .85rem', borderBottom: '1px solid var(--border)', fontSize: '.9rem' };
  const inp = {
    flex: 1, minWidth: 140, padding: '.5rem .8rem',
    background: 'var(--surface2)', border: '1px solid var(--border2)',
    borderRadius: 'var(--radius-sm)', color: 'var(--text)', fontSize: '.875rem', outline: 'none'
  };

  return (
    <div>
      <Card>
        <CardTitle>Create New User</CardTitle>
        <div style={{ display: 'flex', gap: '.6rem', flexWrap: 'wrap' }}>
          <input style={inp} type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && create()} />
          <input style={inp} type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && create()} />
          <select value={role} onChange={e => setRole(e.target.value)} style={{ padding: '.5rem .7rem', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border2)', background: 'var(--surface2)', color: 'var(--text)' }}>
            <option value="viewer">Viewer</option>
            <option value="admin">Admin</option>
          </select>
          <Btn onClick={create}>Create</Btn>
        </div>
        {alert && <Alert type={alert.type}>{alert.msg}</Alert>}
      </Card>
      <Card>
        <CardTitle>All Users ({users.length})</CardTitle>
        {loading
          ? <Alert type="loading">Loading users…</Alert>
          : users.length === 0
            ? <div style={{ color: 'var(--muted)', fontSize: '.9rem' }}>No users found.</div>
            : (
              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr>
                      <th style={thStyle}>Email</th>
                      <th style={thStyle}>Role</th>
                      <th style={thStyle}>Created</th>
                      <th style={{ ...thStyle, textAlign: 'right' }} />
                    </tr>
                  </thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td style={tdStyle}>{u.email}</td>
                        <td style={tdStyle}>
                          <span style={{
                            display: 'inline-block', padding: '.15rem .5rem', borderRadius: 6,
                            fontSize: '.72rem', fontWeight: 600,
                            background: u.role === 'admin' ? 'rgba(249,115,22,.15)' : 'var(--surface2)',
                            color: u.role === 'admin' ? 'var(--accent)' : 'var(--muted)',
                            border: u.role === 'admin' ? '1px solid rgba(249,115,22,.3)' : '1px solid var(--border)'
                          }}>{u.role}</span>
                        </td>
                        <td style={{ ...tdStyle, color: 'var(--muted)', fontSize: '.82rem' }}>
                          {u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB') : '—'}
                        </td>
                        <td style={{ ...tdStyle, textAlign: 'right' }}>
                          {u.email !== currentUserEmail && (
                            <Btn variant="danger" onClick={() => del(u.id, u.email)}>Delete</Btn>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )
        }
      </Card>
    </div>
  );
}

/* Login Page */
function LoginPage({ onLogin }) {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const fd = new FormData();
      fd.append('username', email);
      fd.append('password', password);
      const res  = await fetch('/auth/login', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
      saveToken(data.access_token);
      onLogin(data.access_token);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const inp = {
    width: '100%', padding: '.65rem .9rem',
    background: 'var(--surface2)', border: '1px solid var(--border2)',
    borderRadius: 'var(--radius-sm)', color: 'var(--text)',
    fontSize: '.9rem', outline: 'none'
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
      <div style={{
        width: 360, background: 'var(--surface)',
        borderRadius: 'var(--radius)', border: '1px solid var(--border)',
        padding: '2.5rem 2rem', animation: 'riseIn .25s ease'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '.75rem', marginBottom: '2rem' }}>
          <div style={{
            width: 40, height: 40, borderRadius: 12,
            background: 'linear-gradient(135deg, #f97316, #f59e0b)',
            display: 'grid', placeItems: 'center', color: '#0c0a09', fontWeight: 700, fontSize: '1.1rem'
          }}>Z</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: '1.1rem' }}>Zen Finance</div>
            <div style={{ color: 'var(--muted)', fontSize: '.8rem' }}>Sign in to continue</div>
          </div>
        </div>

        <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: '.9rem' }}>
          <div>
            <label style={{ fontSize: '.72rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: '.3rem' }}>Email</label>
            <input type="email" required autoFocus style={inp} value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          <div>
            <label style={{ fontSize: '.72rem', color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.06em', display: 'block', marginBottom: '.3rem' }}>Password</label>
            <input type="password" required style={inp} value={password} onChange={e => setPassword(e.target.value)} />
          </div>

          {error && (
            <div style={{ color: 'var(--danger)', fontSize: '.85rem', background: 'var(--danger-bg)', padding: '.5rem .75rem', borderRadius: 'var(--radius-sm)' }}>
              {error}
            </div>
          )}

          <button
            type="submit" disabled={loading}
            style={{
              width: '100%', padding: '.7rem',
              background: loading ? 'var(--border2)' : 'var(--accent)',
              border: 'none', borderRadius: 'var(--radius-sm)',
              color: loading ? 'var(--muted)' : '#0c0a09',
              fontWeight: 700, fontSize: '.95rem',
              cursor: loading ? 'not-allowed' : 'pointer',
              transition: 'background .15s', marginTop: '.25rem'
            }}
          >
            {loading ? 'Signing in…' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

/* App */
function App() {
  const [token, setToken] = useState(getToken());
  const [page, setPage] = useState('home');
  const [userRole, setUserRole] = useState(null);
  const [currentUserEmail, setCurrentUserEmail] = useState(null);
  const defaultMonth = new Date().toLocaleString('en-GB', { month: 'short', year: 'numeric' });
  const [activeMonth, setActiveMonth] = useState(defaultMonth);
  const [months, setMonths] = useState([]);
  const [cashflowRows, setCashflowRows] = useState([]);

  const loadMonths = useCallback(async () => {
    const res = await authFetch('/cashflow/months');
    const data = await res.json();
    if (data.length === 0) {
      await authFetch('/cashflow/months', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: defaultMonth })
      });
      setMonths([defaultMonth]);
      setActiveMonth(defaultMonth);
      return;
    }
    setMonths(data);
    if (!data.includes(activeMonth)) setActiveMonth(data[data.length - 1]);
  }, [defaultMonth, activeMonth]);

  const loadCashflow = useCallback(async (month) => {
    if (!month) return;
    const res = await authFetch(`/cashflow/${encodeURIComponent(month)}`);
    const data = await res.json();
    setCashflowRows(data);
  }, []);

  useEffect(() => {
    if (token) {
      authFetch('/auth/me').then(r => r.json()).then(d => {
        if (d.email) { setUserRole(d.role); setCurrentUserEmail(d.email); }
      }).catch(() => {});
    }
  }, [token]);

  useEffect(() => { loadMonths(); }, [loadMonths]);
  useEffect(() => { loadCashflow(activeMonth); }, [activeMonth, loadCashflow]);

  const addCashflowRow = async (row) => {
    const res = await authFetch(`/cashflow/${encodeURIComponent(activeMonth)}/entries`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(row)
    });
    const data = await res.json();
    if (data.rows) setCashflowRows(data.rows);
  };

  const deleteCashflowRow = async (row) => {
    const res = await authFetch(`/cashflow/${encodeURIComponent(activeMonth)}/entries/${row.id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.rows) setCashflowRows(data.rows);
  };

  const editCashflowRow = async (entryId, payload) => {
    const res = await authFetch(`/cashflow/${encodeURIComponent(activeMonth)}/entries/${entryId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.rows) setCashflowRows(data.rows);
  };

  const addMonth = async (month) => {
    const res = await authFetch('/cashflow/months', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ month })
    });
    const data = await res.json();
    if (data.months) setMonths(data.months);
    setActiveMonth(month);
  };

  const logout = () => { clearToken(); setToken(null); };

  if (!token) return <LoginPage onLogin={t => setToken(t)} />;

  const pageMeta = {
    home:    { title: 'Dashboard', subtitle: 'Overview of your financial activity.' },
    bosta:   { title: 'Bosta Orders', subtitle: 'Upload a Bosta inventory export to generate a sales report by SKU.' },
    cashflow:{ title: 'Cashflow', subtitle: 'Track your daily money in and money out.' },
    analytics:{ title: 'Analytics', subtitle: 'Money in/out totals and spend distribution.' },
    products:{ title: 'Products', subtitle: 'Maintain your SKU name list for reports.' },
    users:   { title: 'User Management', subtitle: 'Create and manage user accounts.' }
  };

  const active = pageMeta[page];

  return (
    <div style={S.app}>
      <aside style={S.sidebar}>
        <div style={S.brand}>
          <div style={S.logo}>Z</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: '1rem' }}>Zen Finance</div>
            <div style={{ color: 'var(--muted)', fontSize: '.75rem' }}>Dashboard</div>
          </div>
        </div>
        <nav style={{ display: 'grid', gap: '.4rem' }}>
          <div style={S.navItem(page === 'home')} onClick={() => setPage('home')}>Home</div>
          <div style={S.navItem(page === 'analytics')} onClick={() => setPage('analytics')}>Analytics</div>
          <div style={S.navItem(page === 'cashflow')} onClick={() => setPage('cashflow')}>Cashflow</div>
          <div style={S.navItem(page === 'bosta')} onClick={() => setPage('bosta')}>Bosta Orders</div>
          <div style={S.navItem(page === 'products')} onClick={() => setPage('products')}>Products</div>
          {userRole === 'admin' && (
            <div style={S.navItem(page === 'users')} onClick={() => setPage('users')}>Users</div>
          )}
        </nav>
        <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: '.5rem' }}>
          <button
            onClick={logout}
            style={{
              width: '100%', padding: '.5rem .75rem',
              background: 'none', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-sm)', color: 'var(--muted)',
              fontSize: '.82rem', cursor: 'pointer', textAlign: 'left',
              transition: 'border-color .15s, color .15s'
            }}
            onMouseEnter={e => { e.target.style.borderColor = 'var(--danger)'; e.target.style.color = 'var(--danger)'; }}
            onMouseLeave={e => { e.target.style.borderColor = 'var(--border)'; e.target.style.color = 'var(--muted)'; }}
          >
            Sign out
          </button>
        </div>
      </aside>

      <main style={S.main}>
        <header style={S.header}>
          <div>
            <h1 style={S.h1}>{active.title}</h1>
            <p style={S.sub}>{active.subtitle}</p>
          </div>
        </header>

        {page === 'home' && <HomeTab onNavigate={setPage} />}
        {page === 'bosta' && <BostaOrdersTab />}
        {page === 'cashflow' && (
          <CashflowTab
            rows={cashflowRows}
            onAdd={addCashflowRow}
            onDelete={deleteCashflowRow}
            onEdit={editCashflowRow}
            months={months}
            activeMonth={activeMonth}
            onMonthChange={setActiveMonth}
            onAddMonth={addMonth}
          />
        )}
        {page === 'analytics' && <AnalyticsTab rows={cashflowRows} />}
        {page === 'products' && <ProductsTab />}
        {page === 'users' && <UsersTab currentUserEmail={currentUserEmail} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
